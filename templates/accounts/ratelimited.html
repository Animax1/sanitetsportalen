{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:500px;margin:4rem auto;">
  <div class="card border-danger">
    <div class="card-body text-center p-4">
      <i class="bi bi-shield-exclamation text-danger" style="font-size:3rem;"></i>
      <h3 class="mt-3">For mange forsøk</h3>
      <p class="text-muted">
        Vi har registrert for mange innloggingsforsøk fra denne IP-adressen.
        Vent noen minutter og prøv igjen.
      </p>
      <p class="small text-muted mt-3">
        Dette er en sikkerhetsmekanisme for å beskytte mot automatiserte angrep.
      </p>
      <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary mt-2">
        <i class="bi bi-arrow-left me-1"></i>Tilbake til innlogging
      </a>
    </div>
  </div>
</div>
{% endblock %}
