{% load static %}
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innlogging – Pasientregistrering</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  body { background: #0f172a; color: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: "Segoe UI", system-ui, sans-serif; }
  .login-card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; }
  .login-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; }
  .login-sub { font-size: 0.85rem; color: #94a3b8; margin-bottom: 1.5rem; }
  .form-control { background: #1e293b !important; color: #e5e7eb !important; border-color: #334155 !important; }
  .form-control:focus { box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.2) !important; border-color: #3b82f6 !important; }
  .form-label { color: #cbd5e1; font-size: 0.85rem; font-weight: 600; }
  .alert-danger { background: #450a0a; border-color: #7f1d1d; color: #fca5a5; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-3">
    <i class="bi bi-heart-pulse-fill" style="font-size:2rem;color:#3b82f6;"></i>
  </div>
  <div class="login-title text-center">Pasientregistrering</div>
  <div class="login-sub text-center">Logg inn for å fortsette</div>

  {% if error %}
  <div class="alert alert-danger">
    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
  </div>
  {% endif %}

  <form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" for="id_username">Brukernavn</label>
      <input type="text" name="username" id="id_username" class="form-control" autofocus autocomplete="username" value="{{ form.username.value|default:'' }}">
    </div>
    <div class="mb-3">
      <label class="form-label" for="id_password">Passord</label>
      <input type="password" name="password" id="id_password" class="form-control" autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i>Logg inn
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
